<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Student Result Entry</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f4f4f4;
    color: #111;
    font-size: 15px;
    padding-bottom: 40px;
  }

  /* TOP BAR */
  .topbar {
    background: #1a1a2e;
    color: #fff;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .topbar h1 { font-size: 16px; font-weight: 600; flex: 1; }
  .topbar .step-indicator { font-size: 12px; color: #aaa; white-space: nowrap; }

  /* PROGRESS BAR */
  .progress-wrap { background: #333; height: 3px; }
  .progress-bar { background: #4ade80; height: 3px; transition: width 0.3s; }

  /* SCREENS */
  .screen { display: none; padding: 16px; max-width: 600px; margin: 0 auto; }
  .screen.active { display: block; }

  /* CARD */
  .card {
    background: #fff;
    border-radius: 10px;
    border: 1px solid #e0e0e0;
    margin-bottom: 12px;
    overflow: hidden;
  }
  .card-head {
    background: #f9f9f9;
    border-bottom: 1px solid #e8e8e8;
    padding: 10px 14px;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.06em;
    color: #555;
    text-transform: uppercase;
  }
  .card-body { padding: 14px; }

  /* CLASS GRID */
  .class-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }
  .class-btn {
    padding: 14px 6px;
    border: 1.5px solid #ddd;
    border-radius: 8px;
    background: #fff;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    text-align: center;
    transition: all 0.15s;
    color: #222;
  }
  .class-btn:active { transform: scale(0.96); }
  .class-btn.selected {
    border-color: #1a1a2e;
    background: #1a1a2e;
    color: #fff;
  }

  /* FIELDS */
  .field { margin-bottom: 12px; }
  .field label { display: block; font-size: 12px; color: #666; margin-bottom: 4px; font-weight: 500; }
  .field input, .field select {
    width: 100%;
    padding: 11px 12px;
    border: 1.5px solid #ddd;
    border-radius: 8px;
    font-size: 15px;
    color: #111;
    background: #fff;
    outline: none;
    transition: border-color 0.15s;
    -webkit-appearance: none;
  }
  .field input:focus, .field select:focus { border-color: #1a1a2e; }
  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  /* ASSESSMENT TABS */
  .assess-tabs {
    display: flex;
    overflow-x: auto;
    gap: 6px;
    padding: 12px 14px;
    border-bottom: 1px solid #eee;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .assess-tabs::-webkit-scrollbar { display: none; }
  .assess-tab {
    flex-shrink: 0;
    padding: 7px 14px;
    border-radius: 20px;
    border: 1.5px solid #ddd;
    background: #fff;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    color: #444;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .assess-tab.active {
    background: #1a1a2e;
    border-color: #1a1a2e;
    color: #fff;
  }
  .assess-tab.done { border-color: #4ade80; color: #166534; background: #f0fdf4; }

  /* SUBJECT MARKS */
  .sub-row {
    display: flex;
    align-items: center;
    padding: 10px 14px;
    border-bottom: 1px solid #f0f0f0;
    gap: 10px;
  }
  .sub-row:last-child { border-bottom: none; }
  .sub-name { flex: 1; font-size: 14px; color: #222; }
  .sub-max { font-size: 12px; color: #999; }
  .marks-input {
    width: 68px;
    padding: 8px;
    border: 1.5px solid #ddd;
    border-radius: 8px;
    font-size: 15px;
    text-align: center;
    color: #111;
    background: #fff;
    outline: none;
    -webkit-appearance: none;
  }
  .marks-input:focus { border-color: #1a1a2e; }
  .marks-input.over { border-color: #ef4444; background: #fef2f2; }

  /* ASSESS PANEL */
  .assess-panel { display: none; }
  .assess-panel.active { display: block; }
  .assess-label {
    padding: 8px 14px;
    font-size: 12px;
    font-weight: 600;
    color: #777;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    background: #fafafa;
    border-bottom: 1px solid #eee;
  }

  /* SUMMARY */
  .sum-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 14px;
    border-bottom: 1px solid #f0f0f0;
    font-size: 14px;
  }
  .sum-row:last-child { border-bottom: none; }
  .sum-label { color: #555; }
  .sum-val { font-weight: 600; color: #111; }
  .auto-tag {
    font-size: 11px;
    background: #f0fdf4;
    color: #166534;
    border: 1px solid #bbf7d0;
    border-radius: 20px;
    padding: 2px 8px;
    font-weight: 500;
  }

  /* BUTTONS */
  .btn-primary {
    width: 100%;
    padding: 14px;
    background: #1a1a2e;
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 6px;
    letter-spacing: 0.02em;
  }
  .btn-primary:active { opacity: 0.85; }
  .btn-primary:disabled { background: #aaa; cursor: default; }
  .btn-sec {
    width: 100%;
    padding: 12px;
    background: #fff;
    color: #444;
    border: 1.5px solid #ddd;
    border-radius: 10px;
    font-size: 15px;
    cursor: pointer;
    margin-top: 8px;
  }

  /* SUCCESS */
  .success-screen { text-align: center; padding: 40px 20px; }
  .success-icon {
    width: 64px; height: 64px;
    background: #f0fdf4;
    border: 2px solid #4ade80;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 16px;
    font-size: 28px;
  }

  /* NOTICE */
  .notice {
    background: #fffbea;
    border: 1px solid #fde68a;
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 13px;
    color: #92400e;
    margin-bottom: 12px;
  }

  /* REVIEW TABLE */
  .review-sub {
    font-size: 13px;
    font-weight: 600;
    color: #1a1a2e;
    padding: 8px 14px 4px;
    background: #f9f9f9;
    border-bottom: 1px solid #eee;
  }
  .review-assess-row {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    padding: 8px 14px;
    border-bottom: 1px solid #f0f0f0;
  }
  .review-assess-row:last-child { border-bottom: none; }
  .assess-chip {
    font-size: 12px;
    padding: 4px 10px;
    background: #f4f4f4;
    border-radius: 20px;
    color: #333;
  }
  .assess-chip span { font-weight: 600; color: #1a1a2e; }
</style>
</head>
<body>

<div class="topbar">
  <h1 id="topTitle">Student Result Entry</h1>
  <span class="step-indicator" id="stepLabel">Step 1 of 4</span>
</div>
<div class="progress-wrap">
  <div class="progress-bar" id="progressBar" style="width:25%"></div>
</div>

<!-- SCREEN 1: CLASS SELECTION -->
<div class="screen active" id="screen1">
  <div style="height:14px"></div>
  <div class="card">
    <div class="card-head">Select Class</div>
    <div class="card-body">
      <div class="class-grid" id="classGrid"></div>
    </div>
  </div>
  <button class="btn-primary" id="s1Next" disabled onclick="goTo(2)">Continue →</button>
</div>

<!-- SCREEN 2: STUDENT INFO -->
<div class="screen" id="screen2">
  <div style="height:14px"></div>
  <div class="card">
    <div class="card-head">Student Information</div>
    <div class="card-body">
      <div class="field">
        <label>Student Name *</label>
        <input type="text" id="stuName" placeholder="Full name" autocomplete="off">
      </div>
      <div class="two-col">
        <div class="field">
          <label>Roll No *</label>
          <input type="number" id="rollNo" placeholder="e.g. 5">
        </div>
        <div class="field">
          <label>SR No</label>
          <input type="text" id="srNo" placeholder="SR No">
        </div>
      </div>
      <div class="field">
        <label>Father's Name</label>
        <input type="text" id="fatherName" placeholder="Father's full name">
      </div>
      <div class="two-col">
        <div class="field">
          <label>Date of Birth</label>
          <input type="date" id="dob">
        </div>
        <div class="field">
          <label>Attendance %</label>
          <input type="number" id="attendance" placeholder="e.g. 92" min="0" max="100">
        </div>
      </div>
      <div class="field">
        <label>Address</label>
        <input type="text" id="address" placeholder="Address">
      </div>
    </div>
  </div>
  <button class="btn-primary" onclick="goTo(3)">Continue to Marks →</button>
  <button class="btn-sec" onclick="goTo(1)">← Back</button>
</div>

<!-- SCREEN 3: MARKS ENTRY -->
<div class="screen" id="screen3">
  <div style="height:14px"></div>
  <div class="notice">Scroll tabs left/right to switch assessment. All 6 must be filled.</div>
  <div class="card">
    <div class="assess-tabs" id="assessTabs"></div>
    <div id="assessPanels"></div>
  </div>
  <button class="btn-primary" onclick="goTo(4)">Review & Submit →</button>
  <button class="btn-sec" onclick="goTo(2)">← Back</button>
</div>

<!-- SCREEN 4: REVIEW -->
<div class="screen" id="screen4">
  <div style="height:14px"></div>
  <div class="card">
    <div class="card-head">Student Details</div>
    <div id="reviewInfo"></div>
  </div>
  <div class="card">
    <div class="card-head">Marks Summary</div>
    <div id="reviewMarks"></div>
  </div>
  <div class="card">
    <div class="card-head">Auto-Calculated Result</div>
    <div id="reviewResult"></div>
  </div>
  <button class="btn-primary" onclick="submitData()">✓ Submit Entry</button>
  <button class="btn-sec" onclick="goTo(3)">← Edit Marks</button>
</div>

<!-- SCREEN 5: SUCCESS -->
<div class="screen" id="screen5">
  <div style="height:40px"></div>
  <div class="success-screen">
    <div class="success-icon">✓</div>
    <h2 style="font-size:20px;margin-bottom:8px">Entry Submitted!</h2>
    <p style="color:#666;font-size:14px;margin-bottom:6px" id="successName"></p>
    <p style="color:#999;font-size:13px;margin-bottom:32px">Data saved successfully.</p>
    <button class="btn-primary" onclick="resetAll()">+ Add Another Student</button>
    <button class="btn-sec" onclick="goTo(1)">Change Class</button>
  </div>
</div>

<script>
const CLASSES = ['PG','LKG','UKG','1st','2nd','3rd','4th','5th','6th','7th','8th'];

const SUBJECTS = {
  'PG':  ['Hindi Oral','Hindi Writing','English Oral','English Writing','Math Oral','Math Writing','Rhymes'],
  'LKG': ['Hindi Oral','Hindi Writing','English Oral','English Writing','Math Oral','Math Writing','Rhymes'],
  'UKG': ['Hindi Oral','Hindi Writing','English Oral','English Writing','Math Oral','Math Writing','Rhymes'],
  '1st': ['English','Hindi','Mathematics','EVS','GK','Urdu','Basic Sanskrit','Art','PT'],
  '2nd': ['English','Hindi','Mathematics','EVS','GK','Urdu','Basic Sanskrit','Art','PT'],
  '3rd': ['Hindi','English','Mathematics','Science','Social Studies','GK','Urdu','Sanskrit','Art','PT','Computer'],
  '4th': ['Hindi','English','Mathematics','Science','Social Studies','GK','Urdu','Sanskrit','Art','PT','Computer'],
  '5th': ['Hindi','English','Mathematics','Science','Social Studies','GK','Urdu','Sanskrit','Art','PT','Computer'],
  '6th': ['Hindi','English','Mathematics','Science','SST','GK','Urdu','Sanskrit','Art','PT'],
  '7th': ['Hindi','English','Mathematics','Science','SST','GK','Urdu','Sanskrit','Art','PT'],
  '8th': ['Hindi','English','Mathematics','Science','SST','GK','Urdu','Sanskrit','Art','PT'],
};

const ASSESSMENTS = ['FA1','FA2','SA1','FA3','FA4','SA2'];
const MAX = { FA1:20, FA2:20, SA1:60, FA3:20, FA4:20, SA2:60 };

let selectedClass = '';
let currentAssess = 'FA1';

// Build class grid
const grid = document.getElementById('classGrid');
CLASSES.forEach(cls => {
  const btn = document.createElement('button');
  btn.className = 'class-btn';
  btn.textContent = 'Class ' + cls;
  btn.onclick = () => {
    document.querySelectorAll('.class-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    selectedClass = cls;
    document.getElementById('s1Next').disabled = false;
  };
  grid.appendChild(btn);
});

function buildMarksUI() {
  const subs = SUBJECTS[selectedClass] || [];
  const tabsEl = document.getElementById('assessTabs');
  const panelsEl = document.getElementById('assessPanels');
  tabsEl.innerHTML = '';
  panelsEl.innerHTML = '';

  ASSESSMENTS.forEach(a => {
    const tab = document.createElement('button');
    tab.className = 'assess-tab' + (a === currentAssess ? ' active' : '');
    tab.textContent = a + ' (/' + MAX[a] + ')';
    tab.dataset.a = a;
    tab.onclick = () => switchTab(a);
    tabsEl.appendChild(tab);

    const panel = document.createElement('div');
    panel.className = 'assess-panel' + (a === currentAssess ? ' active' : '');
    panel.id = 'panel_' + a;

    const isSA = a.startsWith('SA');
    const lbl = document.createElement('div');
    lbl.className = 'assess-label';
    lbl.textContent = (isSA ? 'Summative Assessment — ' : 'Formative Assessment — ') + a + '   |   Max marks per subject: ' + MAX[a];
    panel.appendChild(lbl);

    subs.forEach(sub => {
      const row = document.createElement('div');
      row.className = 'sub-row';
      row.innerHTML = `
        <span class="sub-name">${sub}</span>
        <span class="sub-max">/${MAX[a]}</span>
        <input class="marks-input" type="number" min="0" max="${MAX[a]}"
          id="m_${a}_${sub.replace(/\s/g,'_')}"
          placeholder="—"
          oninput="validateInput(this,${MAX[a]})"
          inputmode="numeric">
      `;
      panel.appendChild(row);
    });

    panelsEl.appendChild(panel);
  });
}

function switchTab(a) {
  currentAssess = a;
  document.querySelectorAll('.assess-tab').forEach(t => {
    t.classList.remove('active');
    if (t.dataset.a === a) t.classList.add('active');
  });
  document.querySelectorAll('.assess-panel').forEach(p => {
    p.classList.toggle('active', p.id === 'panel_' + a);
  });
}

function validateInput(el, max) {
  const v = parseFloat(el.value);
  if (!isNaN(v) && v > max) {
    el.classList.add('over');
  } else {
    el.classList.remove('over');
  }
  updateTabDone();
}

function updateTabDone() {
  const subs = SUBJECTS[selectedClass] || [];
  ASSESSMENTS.forEach(a => {
    const filled = subs.every(sub => {
      const el = document.getElementById(`m_${a}_${sub.replace(/\s/g,'_')}`);
      return el && el.value !== '';
    });
    const tab = document.querySelector(`.assess-tab[data-a="${a}"]`);
    if (tab) {
      tab.classList.toggle('done', filled);
      if (filled && tab.classList.contains('active')) {/* keep active style via order */ }
    }
  });
}

function collectMarks() {
  const subs = SUBJECTS[selectedClass] || [];
  const data = {};
  subs.forEach(sub => {
    data[sub] = {};
    ASSESSMENTS.forEach(a => {
      const el = document.getElementById(`m_${a}_${sub.replace(/\s/g,'_')}`);
      data[sub][a] = el ? (parseFloat(el.value) || 0) : 0;
    });
  });
  return data;
}

function buildReview() {
  const subs = SUBJECTS[selectedClass] || [];
  const marks = collectMarks();

  // Info
  document.getElementById('reviewInfo').innerHTML = `
    <div class="sum-row"><span class="sum-label">Name</span><span class="sum-val">${document.getElementById('stuName').value || '—'}</span></div>
    <div class="sum-row"><span class="sum-label">Class</span><span class="sum-val">Class ${selectedClass}</span></div>
    <div class="sum-row"><span class="sum-label">Roll No</span><span class="sum-val">${document.getElementById('rollNo').value || '—'}</span></div>
    <div class="sum-row"><span class="sum-label">Attendance</span><span class="sum-val">${document.getElementById('attendance').value || '—'}%</span></div>
  `;

  // Marks per subject
  let marksHtml = '';
  let grandTotal = 0;
  const maxGrand = subs.length * 200;

  subs.forEach(sub => {
    const subTotal = ASSESSMENTS.reduce((s, a) => s + (marks[sub][a] || 0), 0);
    grandTotal += subTotal;
    const chips = ASSESSMENTS.map(a => `<span class="assess-chip">${a}: <span>${marks[sub][a] || 0}</span></span>`).join('');
    marksHtml += `
      <div class="review-sub">${sub} — Total: ${subTotal}/200</div>
      <div class="review-assess-row">${chips}</div>
    `;
  });
  document.getElementById('reviewMarks').innerHTML = marksHtml;

  // Result
  const pct = maxGrand > 0 ? (grandTotal / maxGrand * 100).toFixed(1) : 0;
  let remarks = pct >= 90 ? 'Outstanding' : pct >= 75 ? 'Excellent' : pct >= 60 ? 'Good' : pct >= 45 ? 'Average' : 'Needs Improvement';
  document.getElementById('reviewResult').innerHTML = `
    <div class="sum-row"><span class="sum-label">Grand Total</span><span class="sum-val">${grandTotal} / ${maxGrand}</span></div>
    <div class="sum-row"><span class="sum-label">Percentage</span><span class="sum-val">${pct}%</span></div>
    <div class="sum-row"><span class="sum-label">Class Position</span><span class="auto-tag">Auto in Sheet</span></div>
    <div class="sum-row"><span class="sum-label">Remarks</span><span class="sum-val">${remarks}</span></div>
  `;
}

// ✅ PASTE YOUR WEB APP URL HERE (Apps Script → Deploy → Copy Web App URL)
const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbz_BCqLxQTd_2Jedd4wV5DiOB6Cx2JWnkkWgNjQtWVuxTZTta4-qMA6qquyzvEtJZ7KwA/exec';

function submitData() {
  const name = document.getElementById('stuName').value || 'Student';
  const btn = document.querySelector('#screen4 .btn-primary');
  btn.disabled = true;
  btn.textContent = 'Submitting...';

  // URLSearchParams works with no-cors - Apps Script reads e.parameter.data
  const formData = new URLSearchParams();
  formData.append('data', JSON.stringify(collectAllData()));

  fetch(WEB_APP_URL, {
    method: 'POST',
    mode: 'no-cors',
    body: formData
  })
  .then(() => {
    document.getElementById('successName').textContent = name + ' - Class ' + selectedClass;
    goTo(5);
    btn.disabled = false;
    btn.textContent = 'Submit Entry';
  })
  .catch(err => {
    alert('Request failed. Check your internet connection.\n\n' + err.message);
    console.error(err);
    btn.disabled = false;
    btn.textContent = 'Submit Entry';
  });
}

function collectAllData() {
  return {
    class: selectedClass,
    studentName: document.getElementById('stuName').value,
    fatherName: document.getElementById('fatherName').value,
    rollNo: document.getElementById('rollNo').value,
    srNo: document.getElementById('srNo').value,
    dob: document.getElementById('dob').value,
    attendance: document.getElementById('attendance').value,
    address: document.getElementById('address').value,
    subjectOrder: SUBJECTS[selectedClass],
    marks: collectMarks(),
  };
}

function resetAll() {
  // Keep class, clear student data and marks
  document.getElementById('stuName').value = '';
  document.getElementById('rollNo').value = '';
  document.getElementById('srNo').value = '';
  document.getElementById('fatherName').value = '';
  document.getElementById('dob').value = '';
  document.getElementById('attendance').value = '';
  document.getElementById('address').value = '';
  buildMarksUI();
  goTo(2);
}

const TITLES = ['','Select Class','Student Info','Enter Marks','Review','Done'];
const STEPS  = ['','Step 1 of 4','Step 2 of 4','Step 3 of 4','Step 4 of 4',''];
const PCT    = ['','25%','50%','75%','100%','100%'];

function goTo(n) {
  if (n === 3) { currentAssess = 'FA1'; buildMarksUI(); }
  if (n === 4) buildReview();
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen' + n).classList.add('active');
  document.getElementById('topTitle').textContent = TITLES[n] || 'Student Result Entry';
  document.getElementById('stepLabel').textContent = STEPS[n] || '';
  document.getElementById('progressBar').style.width = PCT[n] || '25%';
  window.scrollTo(0, 0);
}
</script>
</body>
</html>
